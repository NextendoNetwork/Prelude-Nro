name: Build NRO

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dkp-pacman -Syu --noconfirm \
            switch-freetype \
            switch-sdl2 \
            switch-sdl2_mixer \
            switch-mpg123

      - name: Build
        run: make -j$(nproc)

      - name: Upload NRO artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextendo-${{ github.ref_name }}
          path: nextendo.nro
          if-no-files-found: error

      - name: Upload NRO to release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: nextendo.nro
          generate_release_notes: true
